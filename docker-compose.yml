version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diving-club-web
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - diving-club-network

networks:
  diving-club-network:
    driver: bridge
